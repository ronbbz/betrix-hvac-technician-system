<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signed Out | Betrix HVAC Technician Business System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body style="padding-top:60px">

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo">Betrix <span>Business Systems</span></div>
    <div class="phase-nav-label">Signed Out</div>
    <div style="display:flex;align-items:center;gap:0">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">Dark</button>
      <button class="nav-cta" onclick="openMemberLogin()">Member Login</button>
    </div>
  </div>
</nav>

<div class="legal-layout">
  <div class="legal-eyebrow">Member Access</div>
  <h1 class="legal-title">You have been logged out.</h1>
  <div class="legal-body">
    <div class="legal-section">
      <strong>Session Closed</strong><br>
      You are now logged out of the Betrix HVAC Technician Business System.
    </div>
    <div class="legal-section">
      <strong>Continue Access</strong><br>
      Log back in to continue your protected dashboard, phases, tools, and system updates.
    </div>
  </div>
  <button class="nav-cta" onclick="openMemberLogin()">Member Login</button>
</div>

<script src="/assets/app.js" defer></script>

<!-- Memberstack public login install -->
<script type="module">
  import memberstackDOM from 'https://cdn.jsdelivr.net/npm/@memberstack/dom@latest/+esm';

  const memberstack = memberstackDOM.init({
    publicKey: "pk_sb_b090b30f6ecf589f710e",
    useCookies: true
  });

  window.openMemberLogin = function () {
    memberstack.openModal("LOGIN").then(({ data, type }) => {
      if (type === "LOGIN") {
        memberstack.hideModal();
        window.location.href = "/access";
      }
    });
  };
</script>
</body>
</html>
